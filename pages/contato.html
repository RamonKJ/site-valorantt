<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valorant | Contato</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar__logo"><a href="../index.html">Valor<span>ant</span></a></div>
        <ul class="navbar__links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li><a href="agentes.html">Agentes</a></li>
      <li><a href="mapas.html">Mapas</a></li>
      <li><a href="armas.html">Armas</a></li>
      <li><a href="times.html">Times</a></li>
      <li><a href="jogadores.html">Jogadores</a></li>
      <li><a href="campeonatos.html">Campeonatos</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
  </nav>

  <section class="pagina-hero">
    <h1 class="pagina-hero__titulo">Entre em <span>Contato</span></h1>
    <p class="pagina-hero__sub">Dúvidas ou sugestões? Fale comigo!</p>
  </section>

  <section class="secao">
    <div style="max-width: 600px; margin: 0 auto;">

      <div class="grupo">
        <label for="nome">Seu Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome..." />
      </div>

      <div class="grupo">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" />
      </div>

      <div class="grupo">
        <label for="assunto">Assunto</label>
        <input type="text" id="assunto" placeholder="Qual o assunto?" />
      </div>

      <div class="grupo">
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" placeholder="Escreva sua mensagem..."></textarea>
      </div>

      <button class="btn btn--vermelho" id="btn-enviar" style="width: 100%;">Enviar Mensagem</button>

      <div class="mensagem-ok" id="aviso-ok">&#10003; Mensagem enviada com sucesso!</div>

    </div>
  </section>

  <footer>
    <div class="footer__logo">Valor<span>ant</span></div>
    
    <p class="footer__copy">&copy; 2026 Valorant Fan Site &mdash; Criado para fins acadêmicos.</p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/main.js"></script>

  <script>
    $('#btn-enviar').on('click', function () {
      var nome     = $('#nome').val().trim();
      var email    = $('#email').val().trim();
      var mensagem = $('#mensagem').val().trim();

      if (nome === '' || email === '' || mensagem === '') {
        alert('Por favor, preencha todos os campos obrigatórios.');
        return;
      }

      $('#aviso-ok').fadeIn(400);
      $('#nome, #email, #assunto, #mensagem').val('');

      setTimeout(function () {
        $('#aviso-ok').fadeOut(400);
      }, 4000);
    });
  </script>

</body>
</html>
